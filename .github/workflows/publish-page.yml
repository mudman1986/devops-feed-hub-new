---
name: Publish DevOps Feed Hub

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *"

permissions:
  actions: read
  contents: read
  id-token: write
  pages: write

jobs:
  publish-pages:
    uses: mudman1986/devops-feed-hub/.github/workflows/publish-pages.yml@v1.0.1
    with:
      engine-repository: mudman1986/devops-feed-hub
      engine-ref: v1.0.1
      feeds-config-path: config/rss-feeds.json
      site-metadata-path: config/site-metadata.json
    secrets: inherit
